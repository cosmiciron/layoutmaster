<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Layoutmaster Exclusion Assembly Demo</title>
  <script type="importmap">
    {
      "imports": {
        "@layoutmaster/layoutmaster": "../src/index.js"
      }
    }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; font-family: "Times New Roman", Times, serif; background: #f7f7f2; color: #171510; }
    main { width: 100%; max-width: 1240px; margin: 0 auto; padding: 16px; display: grid; grid-template-columns: 270px 1fr; gap: 16px; }
    .panel, #surface { min-width: 0; background: #fff; border: 1px solid #d5d2c8; }
    .panel { padding: 16px; }
    h1 { margin: 0 0 8px; font-size: 22px; }
    p.desc { margin: 0 0 14px; font-size: 13px; color: #4c473f; line-height: 1.45; }
    label { display: grid; gap: 6px; margin-top: 14px; font-size: 13px; color: #4c473f; }
    input[type="range"] { width: 100%; }
    .toggle { display: flex; align-items: center; gap: 8px; }
    .toggle input { width: auto; margin: 0; }
    button { width: 100%; margin-top: 14px; padding: 9px 12px; font: inherit; font-weight: 700; background: #e8e6dc; color: #171510; border: 1px solid #c9c4b8; cursor: pointer; }
    button:hover { background: #dedbd0; }
    .status { min-height: 38px; margin-top: 12px; font-size: 13px; color: #4c473f; line-height: 1.45; }
    .status.error { color: #a03020; }
    #surface { position: relative; overflow: hidden; min-height: 700px; touch-action: none; }
    .piece { position: absolute; overflow: visible; user-select: text; z-index: 2; }
    .piece-text { display: inline-block; white-space: pre; overflow: visible; }
    .rig-layer { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; pointer-events: none; z-index: 3; }
    .rig-hitbox { fill: transparent; pointer-events: all; cursor: grab; }
    .rig-hitbox.dragging { cursor: grabbing; }
    .rig-part { fill: rgba(47, 131, 116, 0.22); stroke: rgba(24, 80, 72, 0.52); stroke-width: 1; vector-effect: non-scaling-stroke; }
    line.rig-part { fill: none; }
    .rig-joint { fill: rgba(178, 95, 50, 0.72); }
    .piece-chrome-layer { z-index: 4; }
    @media (max-width: 900px) {
      main { grid-template-columns: minmax(0, 1fr); }
      #surface { min-height: 620px; }
    }
  </style>
</head>
<body>
  <main>
    <section class="panel">
      <h1>Assembly Rig</h1>
      <p class="desc">A stick figure is rebuilt from primitive exclusion parts on every frame. The text wraps around the current pose returned by the same form call.</p>
      <label>
        Wave
        <input id="wave-input" type="range" min="-70" max="40" value="-20">
      </label>
      <label class="toggle"><input id="play-input" type="checkbox" checked> Animate wave</label>
      <label class="toggle"><input id="show-visual-input" type="checkbox" checked> Show stick man visual</label>
      <label class="toggle"><input id="show-pieces-input" type="checkbox"> Show piece framing</label>
      <button id="reset-button" type="button">Reset Rig</button>
      <div id="status" class="status">Idle.</div>
    </section>
    <section id="surface"></section>
  </main>
  <script type="module" src="./exclusion-assembly.js"></script>
</body>
</html>
